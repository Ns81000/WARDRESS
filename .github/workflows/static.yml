# Deploys the public site to GitHub Pages:
#   - the hand-written static landing page (landing/) at the site root
#   - the built interactive walkthrough app at /walkthrough/
name: Deploy static content to Pages

on:
  # Runs on pushes targeting the default branch
  push:
    branches: ["main"]

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment, skipping runs queued between the run in-progress and latest queued.
# However, do NOT cancel in-progress runs as we want to allow these production deployments to complete.
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  # Single deploy job since we're just deploying
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # --- Build the interactive walkthrough (Vite + React) ---
      - uses: pnpm/action-setup@v6
        with:
          version: 11.13.1
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: walkthrough/pnpm-lock.yaml
      - name: Install walkthrough deps
        working-directory: walkthrough
        run: pnpm install --frozen-lockfile
      - name: Build walkthrough
        working-directory: walkthrough
        run: pnpm build

      # --- Assemble the deployable site tree ---
      # landing/ becomes the site root; the built app is nested at /walkthrough/
      # (matching vite base '/WARDRESS/walkthrough/').
      - name: Assemble _site
        run: |
          mkdir -p _site
          cp -r landing/. _site/
          mkdir -p _site/walkthrough
          cp -r walkthrough/dist/. _site/walkthrough/

      - name: Setup Pages
        uses: actions/configure-pages@v5
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '_site'
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
