name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

# Least privilege: CI only reads the repo. Nothing here writes to it.
permissions:
  contents: read

# One run per ref: a new push cancels the in-flight run for the same branch/PR
# instead of queueing behind it. main is exempt (never cancel a landed build).
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  backend:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v5
      - name: Install uv
        uses: astral-sh/setup-uv@v8
        with:
          version: "0.9.2"
          enable-cache: true
          cache-dependency-glob: backend/uv.lock
      - name: Sync dependencies (frozen)
        run: uv sync --frozen
      - name: Lint (ruff)
        run: |
          uv run ruff check .
          uv run ruff format --check .
      - name: Dependency audit (pip-audit)
        # Audits the locked environment. `|| true` is NOT used — a known
        # vulnerability fails CI and must be triaged in PROGRESS.md.
        run: uv run pip-audit --skip-editable
      - name: Tests
        run: uv run pytest -q

  # Migrations run against real Postgres (production's DB), not the SQLite the
  # unit suite uses — this is the only place dialect-specific DDL (enum types,
  # ON DELETE CASCADE, server defaults) is actually exercised. Catches a broken
  # migration or model/migration drift before it reaches a deploy.
  migrations:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: backend
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: wardress
          POSTGRES_PASSWORD: ci-postgres
          POSTGRES_DB: wardress
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U wardress"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgresql+asyncpg://wardress:ci-postgres@localhost:5432/wardress
      JWT_SECRET: ci-placeholder-not-a-real-secret
      CREDENTIALS_ENCRYPTION_KEY: ci-placeholder-encryption-key
    steps:
      - uses: actions/checkout@v5
      - name: Install uv
        uses: astral-sh/setup-uv@v8
        with:
          version: "0.9.2"
          enable-cache: true
          cache-dependency-glob: backend/uv.lock
      - name: Sync dependencies (frozen)
        run: uv sync --frozen
      - name: Apply migrations (fresh DB -> head)
        run: uv run alembic upgrade head
      - name: Round-trip the latest migration (down then up)
        # Proves the newest migration's downgrade is real and reversible —
        # including dropping Postgres enum types autogenerate forgets.
        run: |
          uv run alembic downgrade -1
          uv run alembic upgrade head
      - name: No model/migration drift
        # Fails if the ORM models have diverged from the migration chain
        # (a table/column/enum changed but no migration was written).
        run: uv run alembic check

  frontend:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v5
      - uses: pnpm/action-setup@v6
        with:
          version: 11.13.1
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml
      - name: Install
        run: pnpm install --frozen-lockfile
      - name: Dependency audit
        run: pnpm audit --audit-level high
      - name: Lint
        run: pnpm lint
      - name: Typecheck
        run: pnpm exec tsc -b
      - name: Tests
        run: pnpm exec vitest run
      - name: Build
        run: pnpm build

  docker:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v5
      - name: Validate compose file
        run: docker compose config --quiet
        env:
          POSTGRES_PASSWORD: ci-placeholder
          DATABASE_URL: postgresql+asyncpg://wardress:ci-placeholder@db:5432/wardress
          JWT_SECRET: ci-placeholder
          CREDENTIALS_ENCRYPTION_KEY: ci-placeholder
