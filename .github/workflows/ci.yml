name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "0.9.2"
      - name: Sync dependencies (frozen)
        run: uv sync --frozen
      - name: Lint (ruff)
        run: |
          uv run ruff check .
          uv run ruff format --check .
      - name: Dependency audit (pip-audit)
        # Audits the locked environment. `|| true` is NOT used — a known
        # vulnerability fails CI and must be triaged in PROGRESS.md.
        run: uv run pip-audit --skip-editable
      - name: Tests
        run: uv run pytest -q

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 11.13.1
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml
      - name: Install
        run: pnpm install --frozen-lockfile
      - name: Dependency audit
        run: pnpm audit --audit-level high
      - name: Lint
        run: pnpm lint
      - name: Typecheck
        run: pnpm exec tsc -b
      - name: Tests
        run: pnpm exec vitest run
      - name: Build
        run: pnpm build

  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate compose file
        run: docker compose config --quiet
        env:
          POSTGRES_PASSWORD: ci-placeholder
          DATABASE_URL: postgresql+asyncpg://wardress:ci-placeholder@db:5432/wardress
          JWT_SECRET: ci-placeholder
          CREDENTIALS_ENCRYPTION_KEY: ci-placeholder
