<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Wardress test</title>
<style>
  body { margin: 0; padding: 0; background-color: #000000; }
  .canvas { background-color: #000000; padding: 32px 16px; }
  .card {
    max-width: 560px; margin: 0 auto; background-color: #0a0a0c;
    border: 1px solid rgba(255,255,255,0.14); border-radius: 12px;
    padding: 32px;
    font-family: Inter, Helvetica, Arial, sans-serif;
    color: #fcfdff;
  }
  .wordmark {
    font-size: 14px; font-weight: 500; letter-spacing: 0.35px;
    color: rgba(252,253,255,0.7); margin: 0 0 24px 0;
  }
  .headline {
    font-family: Georgia, "Times New Roman", serif;
    font-size: 28px; font-weight: 400; line-height: 1.1;
    color: #fcfdff; margin: 0 0 16px 0;
  }
  .body-copy { font-size: 14px; line-height: 1.5; color: rgba(252,253,255,0.86); margin: 0; }
  .ok { color: #11ff99; }
</style>
</head>
<body>
  <div class="canvas">
    <div class="card">
      <p class="wordmark">WARDRESS</p>
      <h1 class="headline">Test notification</h1>
      <p class="body-copy">
        This is a test message from Wardress ({{ kind }}).
        <span class="ok">If you can read this, the channel is configured correctly.</span>
      </p>
    </div>
  </div>
</body>
</html>
